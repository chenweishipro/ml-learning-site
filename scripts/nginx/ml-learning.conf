# ML 学习站 — nginx 反代 + HTTPS 配置
# 1. 把这个文件拷到 /etc/nginx/sites-available/ml-learning
# 2. ln -s /etc/nginx/sites-available/ml-learning /etc/nginx/sites-enabled/
# 3. certbot --nginx -d 珍惜时间.website -d www.珍惜时间.website
# 4. nginx -t && systemctl reload nginx

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name 珍惜时间.website www.珍惜时间.website;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 珍惜时间.website www.珍惜时间.website;

    # SSL 证书 (certbot 自动生成)
    ssl_certificate /etc/letsencrypt/live/xn--2eun7iw4njj7a.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--2eun7iw4njj7a.website/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/xn--2eun7iw4njj7a.website/chain.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 日志
    access_log /var/log/nginx/ml-learning.access.log;
    error_log /var/log/nginx/ml-learning.error.log;

    # 客户端最大 body (admin 上传头像等)
    client_max_body_size 10M;

    # 限流: 静态资源不限, API 限 60r/s

    # Next.js 应用 (7892 是 systemd ml-learning.service 监听的端口)
    location / {
        proxy_pass http://127.0.0.1:7892;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 静态资源缓存 (Next.js 自动生成的 /_next/static)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:7892;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # manifest + sw.js (PWA)
    location = /manifest.json {
        proxy_pass http://127.0.0.1:7892;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location = /sw.js {
        proxy_pass http://127.0.0.1:7892;
        add_header Cache-Control "no-cache" always;
    }

    # API 限流
    location /api/ {
        limit_req zone=ml_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:7892;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
