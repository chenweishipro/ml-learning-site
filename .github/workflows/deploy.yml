name: Deploy to Server

# 手动触发 deploy (避免每次 push 都部署)
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本 tag (如 v14.3-xxx)'
        required: false
        default: 'manual'
      backup_name:
        description: '备份前缀'
        required: false
        default: 'pre-deploy'

jobs:
  package:
    name: 打包 standalone
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉所有 tag

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install + build
        run: |
          npm ci --no-audit --no-fund
          npx prisma generate
          npx next build
        env:
          LLM_PROVIDER: mock
          AUTH_SESSION_SECRET: build-placeholder

      - name: Pack standalone
        run: |
          tar --exclude='./node_modules' \
              --exclude='./.next/cache' \
              --exclude='./prisma/dev.db*' \
              --exclude='./.git' \
              --exclude='./tests' \
              --exclude='./playwright-report' \
              -czf ml-site-deploy.tar.gz .
          echo "打包完成:"
          ls -lh ml-site-deploy.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-site-deploy-${{ github.event.inputs.version }}
          path: ml-site-deploy.tar.gz
          retention-days: 30

  deploy:
    name: 部署到 122.51.221.63
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ml-site-deploy-${{ github.event.inputs.version }}
          path: artifacts

      - name: Install sshpass (内网部署用)
        run: sudo apt-get install -y sshpass || true

      - name: Upload to server
        run: |
          cd artifacts
          # 实际部署时换成 scp / rsync 到目标 server
          # 这里只是 demo, 真实 deploy 走本地 ssh-exec.py
          ls -lh ml-site-deploy.tar.gz
          echo "✅ 打包 OK, 等手动 deploy 到 122.51.221.63"
          echo "本地命令:"
          echo "  python3 /workspace/scp-upload.py ml-site-deploy.tar.gz /tmp/ml-site-deploy.tar.gz"
          echo "  sudo systemctl restart ml-learning"
